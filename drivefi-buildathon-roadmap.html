<html lang="pt-BR">

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Progress Bar */
        .overall-progress {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Kanban Board */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .column {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .column-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .column-header h2 {
            font-size: 1.3rem;
            color: #333;
        }

        .column-header .count {
            background: #667eea;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Task Cards */
        .task-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .task-card.completed {
            opacity: 0.7;
            border-left-color: #10b981;
            background: #f0fdf4;
        }

        .task-card.in-progress {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .task-card.blocked {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .task-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .task-checkbox:hover {
            background: #f0f0f0;
        }

        .task-checkbox.checked {
            background: #667eea;
            position: relative;
        }

        .task-checkbox.checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            font-weight: bold;
        }

        .task-title {
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
            line-height: 1.4;
            flex: 1;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .task-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }

        .task-tag.priority-high {
            background: #fee2e2;
            color: #dc2626;
        }

        .task-tag.priority-medium {
            background: #fef3c7;
            color: #d97706;
        }

        .task-tag.priority-low {
            background: #dbeafe;
            color: #2563eb;
        }

        .task-tag.days {
            background: #f3e8ff;
            color: #7c3aed;
        }

        /* Timeline */
        .timeline {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .timeline h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #333;
        }

        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .timeline-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 19px;
            top: 40px;
            width: 2px;
            height: calc(100% + 5px);
            background: #e0e0e0;
        }

        .timeline-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-dot.completed {
            background: #10b981;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-date {
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .timeline-tasks {
            list-style: none;
            font-size: 0.9rem;
            color: #666;
        }

        .timeline-tasks li {
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }

        .timeline-tasks li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #667eea;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .board {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Export Button */
        .export-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>

        // Initialize
        let taskData = tasks.map(task => ({
            ...task,
            status: localStorage.getItem(`task-${task.id}`) || task.status
        }));

        function renderTasks() {
            const todoContainer = document.getElementById('todoTasks');
            const inProgressContainer = document.getElementById('inProgressTasks');
            const completedContainer = document.getElementById('completedTasks');

            todoContainer.innerHTML = '';
            inProgressContainer.innerHTML = '';
            completedContainer.innerHTML = '';

            taskData.forEach(task => {
                const taskCard = createTaskCard(task);
                
                if (task.status === 'todo') {
                    todoContainer.appendChild(taskCard);
                } else if (task.status === 'in-progress') {
                    inProgressContainer.appendChild(taskCard);
                } else if (task.status === 'completed') {
                    completedContainer.appendChild(taskCard);
                }
            });

            updateStats();
        }

        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card ${task.status}`;
            card.onclick = () => toggleTaskStatus(task.id);

            const priorityClass = `priority-${task.priority}`;
            const priorityText = task.priority === 'high' ? '🔥 Alta' : 
                                task.priority === 'medium' ? '⚡ Média' : '💙 Baixa';

            card.innerHTML = `
                <div class="task-header">
                    <div class="task-checkbox ${task.status === 'completed' ? 'checked' : ''}"></div>
                    <div class="task-title">${task.title}</div>
                </div>
                <div class="task-meta">
                    <span class="task-tag ${priorityClass}">${priorityText}</span>
                    <span class="task-tag days">📅 ${task.day}</span>
                </div>
            `;

            return card;
        }

        function toggleTaskStatus(taskId) {
            const task = taskData.find(t => t.id === taskId);
            
            if (task.status === 'todo') {
                task.status = 'in-progress';
            } else if (task.status === 'in-progress') {
                task.status = 'completed';
            } else if (task.status === 'completed') {
                task.status = 'todo';
            }

            localStorage.setItem(`task-${taskId}`, task.status);
            renderTasks();
        }

        function updateStats() {
            const todoCount = taskData.filter(t => t.status === 'todo').length;
            const inProgressCount = taskData.filter(t => t.status === 'in-progress').length;
            const completedCount = taskData.filter(t => t.status === 'completed').length;
            const totalTasks = taskData.length;
            const progressPercent = Math.round((completedCount / totalTasks) * 100);

            document.getElementById('todoCount').textContent = todoCount;
            document.getElementById('inProgressCount').textContent = inProgressCount;
            document.getElementById('completedCount').textContent = completedCount;
            document.getElementById('tasksCompleted').textContent = completedCount;
            document.getElementById('tasksTotal').textContent = totalTasks;
            document.getElementById('progressPercent').textContent = `${progressPercent}%`;
            document.getElementById('progressFill').style.width = `${progressPercent}%`;
            document.getElementById('progressText').textContent = `${progressPercent}%`;

            // Update days left
            const deadline = new Date('2026-06-14');
            const today = new Date();
            const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
            document.getElementById('daysLeft').textContent = daysLeft > 0 ? daysLeft : 0;
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            timeline.forEach((item, index) => {
                const isCompleted = false; // You can add logic to check if all tasks in this phase are completed
                
                const timelineItem = document.createElement('div');
                timelineItem.className = 'timeline-item';
                
                timelineItem.innerHTML = `
                    <div class="timeline-dot ${isCompleted ? 'completed' : ''}">${index + 1}</div>
                    <div class="timeline-content">
                        <div class="timeline-date">${item.date}</div>
                        <div class="timeline-title">${item.title}</div>
                        <ul class="timeline-tasks">
                            ${item.tasks.map(task => `<li>${task}</li>`).join('')}
                        </ul>
                    </div>
                `;
                
                container.appendChild(timelineItem);
            });
        }

        function exportProgress() {
            const data = {
                timestamp: new Date().toISOString(),
                stats: {
                    completed: taskData.filter(t => t.status === 'completed').length,
                    inProgress: taskData.filter(t => t.status === 'in-progress').length,
                    todo: taskData.filter(t => t.status === 'todo').length,
                    total: taskData.length,
                    progressPercent: Math.round((taskData.filter(t => t.status === 'completed').length / taskData.length) * 100)
                },
                tasks: taskData
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `drivefi-progress-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);

            alert('✅ Progresso exportado com sucesso!');
        }

        // Initialize on load
        renderTasks();
        renderTimeline();
    </script>
</body>
</html>
